body:
  text: 小招提寺沙門慧達述泐潭禪師曉月注科此序文分為二章前明作論元由是通序後正明論之宗旨是別序前明作論元由有六節第一標論名二稱美人法三慶幸遭逢四排斥譏嫌五申述元情六宣明序意今第一標舉論名慧達率愚通序長安釋僧肇法師所作宗本物不遷等四論序主云率愚者謙抑之辭也序者爾唯云東西墻謂之序郭璞注云所以序別內外也今達師序述作論元由如東西墻為宅之序也又序者如繭之得序序盡一繭之絲經書得序序盡一經書之義理言小招提寺者在潤州江寧縣舊是丹陽郡始自吳朝爰及晉宋齊梁陳六代已來佛法興盛伽藍精舍接揀連甍名字相參如莊嚴寺則有大莊嚴小莊嚴招提寺亦有大小之名大招提是梁時造小招提是晉時造達師是陳時人居小招提寺為沙門也當陳時名達者非一人故標其寺以為別也然此達公佛義未善文體所作論序多有庸音今只直取序論之大意後之覽者無至譏誚肇論從人得名也是後秦姚興長安人也俗姓張氏家貧以傭書為業遂因善寫曆觀經史備盡墳籍乃為儒生深味玄微每以莊老為心要常讀老子道德章歎曰美則美矣然其棲神冥累之方猶未盡也後見古維摩經披尋翫味乃言始知所歸矣因此出家大通實相年方弱冠英辯遠聞後羅什東來化誘暫憩姑臧肇奔往參承從什稟授先有著述竝將呈什什撫机歎曰吾所造幽深不慙於子文辭麗美實則相遵可同善吉者也遂參隨羅什入長安姚興命肇與僧叡等居逍遙園詳定經論因著述宗本義物不遷不真空般若無知三論涅槃無名論是什遷化後方造也盧山劉遺民因見此論乃歎曰不意方袍復有平叔呈之遠公遠公乃撫机歎曰未嘗有也因披尋翫味遂有書問住復什公亡後遂以涅槃無名論復造寶藏論三章進上秦王秦王姚興答旨慇懃敕令繕寫班諸子姪以為大訓其為時所重也如此晉義熙十年終於長安逍遙園春秋三十有一耳第二稱美人法但末代弘經允屬四依菩薩爰傳茲土抑亦其例末代者佛滅後正法陵遲西竺遂有馬鳴諸祖造論解經弘護佛法允屬者信憑也四依有二一依人二依法依人者十住十行十回向地前菩薩名須陀洹為第一依初地見道菩薩名斯陁含為第二依修道位入二地至八地菩薩名阿那含為第三依八地至十地滿心等覺菩薩名阿羅漢為第四依二依法者一依義不依文二依智不依識三依法不依人四依了義不依不了義爰傳茲土者及至教流此土也抑亦者如西竺諸祖之類也至如彌天大德童壽桑門竝創始命宗圖辯格致播揚宣述所事玄虗唯斯擬聖默之所祖彌天大德即襄陽道安法師因刺史習鑿戲論之談也習公一日訪安云四海習鑿齒固來相謁爾正遇齊次安應聲答云彌天釋道安飯後始相看自此時人稱彌天大德也童壽者亦名羅什本龜茲國人父名鳩摩羅琰母名耆婆是彼國王白純妹合父母二名故稱鳩摩羅耆婆飜就華言童壽什者為此達法師喜此方文字章句之什故華梵合云羅什安師造性空論什師造實相論此土造論之始也桑門者不正梵音也應云沙門飜就華言勤息謂出家人見善勤修見惡止息此二師竝創始於妙性圓明命為宗本造此二論圖度辯別格量致理播布揚顯宣說序述同歸般若體義故云玄虗達公序美此二人造論創始冥契佛理故云唯斯擬聖默之所祖一者鼓論法義是擬聖二者當聖默然是所祖俱照而常寂寂而常照也此序主共美安什二師也自降乎已還歷代古今凡著名僧傳及傳所不載者釋僧叡等三千餘僧清信檀越謝靈運等八百許人至能辯正方言節文階級善覈名教精搜義理揖此羣賢語之所統自降乎已還降乎非文體應云降斯已還也歷代古今此達序主序述自安什之後曆古者指長安後秦在西北歷今者指西晉東晉至梁在江南凡古今共翻譯佛經依經造論僧中叡師首唱俗中謝公為首故云揖此羣賢於文字章句能緣飾佛意俱不得中道只於言語中統貫理事也有美若人超語兼默標本則句句深達佛心明末則言言備通眾教諒是大乘懿典方等博書此序主贊美肇師造四論深契真俗理事性相寂照體用俱絕待不偏有美若人者指肇師也借毛詩云有美一人青陽婉兮逅相遇適我願兮論語云君子哉若人今借此二語共成一句也言超語兼默者謂前安什二師唯得理而文有所闕叡師謝公造論唯得文而理有所闕今肇四論文理兼備故云為超非謂文理勝前四人者言標本者指宗本義言明末者指涅槃論諒是者諒訓信也信此四義論與華嚴楞嚴諸大乘教無異深達佛心也自古自今著文著筆詳汰名賢所作諸論或六家七宗爰延十二竝判其臧否辯其差當此明諸家造論得失也詳者支法詳支遁弟子從師姓氏汰者竺法汰竺道猷弟子支法詳造實相論竺法汰造本無論俱有得失高僧傳中此二人相繼為名賢六家七宗其七義爰者緩也短義延者長義此十二論中多有辯爭是非長短臧者善也否者惡也差殊的當俱不契佛心中道也梁釋寶唱造俗法論一百六十卷內引述宋莊嚴寺高僧曇濟作六家七宗論論有六家分成七宗第一本無宗第二本無玄妙宗出第一本無宗第三即色宗第四義合宗亦云識合宗第五幻化宗亦云如幻宗第六心無宗第七緣會宗亦云體會宗本有六家第一家分為二宗故成七宗言十二者續法論云下定林寺釋慧鏡作實相六宗論先設客問二諦一體義然後引六宗義答之第一家以理實為空凡夫謂有為有空即真諦有即俗諦第二家以色性是空為空色體是有為有第三家以離緣無山為空因緣成山為有第四家以心從緣生為空離緣別有心體為有第五家以邪見所計心空為空不空因緣所生之心為有第六家以名色所依之物實空為空世流布中假名為有前有六家後有六家合成十二故云爰延十二也臧否者前六家判第四為臧餘五家為否後六家論中辯前五家為差後五家為當唯此憲章無弊斯咎憲者法也前十二家皆有是非之弊今肇法師四論無有此弊但是而無非也良由襟情泛若不知何係譬彼淵海數越九流挺拔清虗蕭然物外良由者多以也序主美肇師襟靈情田泛泛然如淵深之海竝無畔岸係屬也故云譬彼淵海譬訓譬也數越九流者美肇師文筆如海不落數量九流者有二一依人二依境依人者俗諦仲尼之學如海諸子百家如分九流一儒家流二道家流三墨家流四名家流五雜家流六農家流七縱橫家流八法家流九小說家流二依境名九流者亦謂之九江也此是夏禹疏決天下洪水分為九江流入大海一曰烏白江二曰箘江三曰蚌江四曰烏江五曰嘉美江六曰畎江七曰源江八曰廩江九曰提江序主美肇師四論不落數量如海也負生知之性靈心正直如豫章之木標表拔萃於眾木也識情清淨虗明曠大於萬物之外冥契法身之理更無一法一人過越於肇師也知公者希歸公採什如曰不知則公貴矣知公者希此一句借老子道德經中吾言甚易知章第七十彼章云吾言甚易知甚易行唐玄宗注云吾言說契理故易知事簡故易行老君又云天下莫能知莫能行玄宗注云天下滯言而不悟事順而不約故莫能知莫能行老君又云言有宗事有君玄宗注云言者在理理得而言忘故言以無言為宗事者在功功成而不宰故事以無事為君老君又云夫唯無知是以不我知玄宗注云夫唯世俗之人無了之知是以不知我無言無事之教老君又云知我者希則我者貴玄宗注云了知我忘言之教意者希少法則我不言之教意至貴老君又云是以聖人被褐懷玉玄宗注云被褐者晦其外懷王者明其內故知者希少序主變老君我字作公字時人只歸伏四論之文字耳第三慶幸遭逢達猥生天幸逢此正音忻躍弗已饗讌無疲每至披尋不勝手舞誓願生生盡命弘述達於肇之遺文其猶若是猥生者多生也天幸者不期而自然逢遇也正音者指此四論也是真正之文契佛心也饗者食時也讌者眠臥時也序主自謂披閱四論日久無倦手舞者借子夏詩序云不知手之舞之足之蹈之表忻躍之極也肇之遺文者指四論也誓願不輕捨耳況中百門觀爰洎方等深經而不至增乎況者比況相類也序主指肇之四論比類中觀論百法明門論及方廣華嚴等經更無一字增加也第四排斥譏嫌世諺咸云肇之所作故是誠實真諦地論通宗莊老所資猛浪之說世諺者世俗無稽之譚也肇師亡後滯執名相教者譏毀肇之四論其文是誠實論中真諦義十地論中通宗義更以莊老書中言辭緣飾相資猛浪之說者莊子齊物篇中借一句是無根本不精要之辭此外人譏毀也古之既有譏謗今之𨷖爭嫉妬更多只如嘉祐中滕州東山明教禪師契嵩進上仁宗皇帝正宗記十二卷尋敕令頒入譯經院隨與藏經印布天下恩賜獎譽古來未有如此者也當時醫僧子昉富有衣鉢遂於蘇臺招集淺學禪律者造作文字毀謗禪宗復命相識官人冠序刊之古今有此外道也此實巨蠱之言欺誣亡沒街巷陋音未之足拾巨蠱者大毒之言肇師亡後以此毒害陋音欺聖罔賢固不足採聽也佛在之日尚有五千增上慢者而況今之乎第五申述元情夫神道不形心敏難繪既文拘而義遠故眾端之所詭肇之卜意豈徒然哉良有以也神道不形者謂法身無形像如太虗空心敏難繪者謂般若無知亦難相狀求也繪者寫邈書𦘕也謂法身與觀照般若寂而常照照而常寂離諸名相文拘義遠者四論中文字拘束義理深奧故肇師須假此方經書文言強飾緣之令後之學般若人易為曉會故云眾端之所詭眾端者四論端由也所詭者謂肇師假此方文言經書變通有異西竺梵音豈空然也如復徇狎其言願生生不面至獲忍心還度斯下序主以析設二法弘護四論也恐後世人隨逐無稽之譚謗毀故云如復徇狎其言願生生不與其人相見也徇者順也狎者親也除是序主成等正覺得無生法忍方可度脫此下根等人也第六宣明序意達留連講肆二十餘年頗逢重席末覩斯論聊寄一序託悟在中同我賢余請俟來哲梁普通年前達麼未到此土只有名相講席故云留連講肆也頗逢重席者頗訓多也序主多遇奪席明師重席者後漢帝每朝正日令戴憑侍中與諸儒論經勝者奪席而坐憑勝其日奪五十餘重時人語曰論經不窮戴侍中末覩斯論者序主謂前二十餘年雖多逢明師末後披此四論句句深達佛理與前名師不同故聊寄述此通序庶表序主悟解肇意深達也同我者與序主悟解一般賢余者悟解勝於序主俱俟來哲臧否也後序論之宗旨文中有四科第一序次第二遣相三稱歎四簡別是論非論今第一序次第夫大分深義厥號本無十二門論云大分者即空也非斷滅空是法身真空之理故云深義也故建言宗旨標乎實相實相者無相也謂真空之體本無名相於無相中建立不壞假名而譚實相耳開空法道莫逾真俗所以次釋二諦顯佛教門真空不礙於幻有故從體起用所以有萬法教云森羅及萬像一法之所印無過越於真俗二諦也雪山童子為求半偈捨身樹神問曰此偈何益童子答曰如是偈者諸佛所說開空法道此出涅槃經也已上序主宗本義物不遷論并不真空論故云所以次釋二諦顯佛教門以佛教門出三界苦一代時教不越真俗二諦為門也但圓正之因無上般若至極之果唯有涅槃故末啟重玄明眾聖之所宅圓正之因者涅槃正因也無有上於般若此序無名論也般若無知為涅槃正因涅槃無名為般若極果所以前序物不遷不真空二論後序無知無名二論故云末啟重玄涅槃是一玄般若是一玄末者於物不遷不真空二論後造此無知二論重玄者借老子道經中二句玄之又玄眾妙之門故云明眾聖之所宅前言真俗指前二論不遷即俗明真不真即真明俗後言重玄指後二論俱是三賢十聖所居之處也第二遣相雖以性空擬本無本可稱語本絕言非心行處口欲譚而辭喪心欲緣而慮忘不可以智知不可以識識非是無辯無心辭辯俱不及也心所分別亦忘耳然則不遷當俗俗則不生此遣即真明俗不真為真真但名說此遣即俗明真但對機言說都無實遣執也若能放曠蕩然崇茲一道指前宗本義曠蕩謂自己法身如太虗空無無礙而不拒彼諸相發揮不執真俗因果一道者故涅槃第十二卷云實際理地一道清淨無有異路耳清耳虗襟無言二諦清耳謂聞性清淨不執言教音聲也虗襟者忘懷絕慮不滯空寂不見有真俗此遣前二論之名相也斯則淨照之功著故般若無知無名之德興而涅槃不稱若不執真俗因果當人觀照般若絕對時無知之知方便無功之功顯也著者顯也即般若無知無所不知也即涅槃無名應興起於妙用耳第三稱歎余謂此說周圓罄佛淵海浩博無涯窮法體相余者序主自謂也此說周圓者指四論也罄盡也更無有一法過此四論中覺性相浩博無邊不落數量耳雖復言約而義豐文華而理詣語勢連環意實孤誕言約者少也豐者備也指四論中文字雖簡少其義理豐備該括一代時教文華者謂四論中文句華麗引此土經書緣飾令人覽之易曉然句句俱到詣諸佛理處言語血脈不斷如貫連環中其明理事之意絕待孤標拔萃於思議之表也連環者出莊子天下篇第三十二此惠子之辯惠子言連環可解取不窮之義郭象注云環之相貫貫於空處不貫於環也是以兩環貫空不相涉入各自通轉取無窮之義尚可解也序主指四論中語論雖無窮其冥契佛意其實標出乎言外也敢是絕妙好辤莫不竭茲洪論序主美肇師四論文理俱詣借曹娥後蔡邕之言也漢時曹盰渡浙江溺死其女曹娥年十四求父屍不得投浙江死經宿抱父屍而出杜尚為作安於會稽上虞山漢末蔡邕讀之於陰鐫八字云黃絹幼婦外孫韲臼後曹操同楊脩行兵因覽此八字操問脩解否答曰已解操令脩且勿言待吾思之行三十里操方解乃自為歎曰有智無智較三十里尋因征戰殺之操一諸子皆請救之操曰楊脩是人中之龍非汝力之所駕馭遂殺之釋之曰黃絹是色絲色絲是絕字幼婦是少女少女是妙字外孫是女子女子是好字韲臼是受辛受辛是辤字序主贊美四論同是絕妙好辤竭者窮盡也洪者大也佛理奧妙盡在此四大論中耳所以童壽歎言解空第一肇公其人斯言有由矣彰在翰牘名僧傳慧觀門中什見肇潤文製作撫机歎略曰實同善吉已在前注中具述也時人謂什公得肇如佛有須菩提也此歎美之言彰顯在高傳翰者筆牘簡也第四簡別是論非論但宗本蕭然莫能致詰不遷等四論事開接引問答㭊微所以稱論宗本蕭然者取蕭然曠大如虗空不可窮詰畔岸非是論之正文都序四論宗旨物不遷等四其中以事明理開示接引後學初機有問有答㭊理精微研覈真偽所以目之為論也
